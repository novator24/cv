apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "warehouse-vlm-sorting.fullname" . }}-vlm
  labels:
    app: vlm-inference
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: vlm-inference
  template:
    metadata:
      labels:
        app: vlm-inference
    spec:
      {{- with .Values.nodeSelector.vlm }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: vlm-inference
          image: "{{ .Values.image.vlm.repository }}:{{ .Values.image.vlm.tag }}"
          imagePullPolicy: {{ .Values.image.vlm.pullPolicy }}
          env:
            - name: TEMPORAL_MEMORY_FRAMES
              value: {{ .Values.vlmSettings.temporalMemoryFrames | quote }}
            - name: MODEL_TEMPERATURE
              value: {{ .Values.vlmSettings.temperature | quote }}
          resources:
            {{- toYaml .Values.resources.vlm | nindent 12 }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
